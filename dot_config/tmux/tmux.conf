# Set the prefix keys
set -g prefix C-a

# Configure options
set -g mouse on
set -g mode-keys vi
set -g set-clipboard on
set -g history-limit 100000

# Configure pane/window options
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Configure keybindings
bind X kill-pane
bind C new-window
bind Q confirm-before -p "kill-server? (y/n)" kill-server

# Plugins
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'mrjones2014/smart-splits.nvim'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'

# tmux-floax binding
set -g @floax-bind "F"

# Save shell history in panes
set -g @resurrect-capture-pane-contents "on"

# Search selected text on Google with Shift-s
set -g @open-S 'https://www.google.com/search?q='

# Configure the status-line style
set -g status-left ""
set -g status-left-length 100
set -g status-right-length 100
set -g status-position top

# Configure the catppuccin plugin
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background 'none'
set -g @catppuccin_date_time_text " %Y-%m-%d"

# Run catppuccin
run '~/.config/tmux/plugins/tmux/catppuccin.tmux'

# Configure the catppuccin's window style
set -g @catppuccin_window_flags "icon"
set -g @catppuccin_window_status_style "custom"
set -g @catppuccin_window_text "#{?#{==:#W,#{basename #{pane_current_path}}}, #{b:pane_current_path}, #W}"

# Configure the catppuccin's current window style
set -g @catppuccin_window_current_text "#{?#{==:#W,#{basename #{pane_current_path}}}, #{b:pane_current_path}, #W}"
set -g @catppuccin_window_left_separator "#[bg=default,fg=#{@thm_overlay_2}]#[bg=#{@thm_overlay_2},fg=#{@thm_surface_0}]"
set -g @catppuccin_window_right_separator "#[bg=default,fg=#{@thm_surface_0}]"
set -g @catppuccin_window_current_left_separator "#[bg=default,fg=#{@thm_mauve}]#[bg=#{@thm_mauve},fg=#{@thm_bg}]"
set -g @catppuccin_window_current_middle_separator "#[fg=#{@thm_mauve}]█"
set -g @catppuccin_window_current_right_separator "#[bg=default,fg=#{@thm_surface_1}]"

# Make the status line pretty and add some modules
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{?#{m:*[a-zA-Z]*,#S},#{E:@catppuccin_status_session},}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -agF status-right "#{E:@catppuccin_status_date_time}"

# Run tpm
run '~/.tmux/plugins/tpm/tpm'
